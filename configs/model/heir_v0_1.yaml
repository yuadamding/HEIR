# Model fragment documenting the blueprint defaults. Experiment YAML embeds it.
# Refinement is disabled at the experiment level. An explicit refine command
# defaults to one fine-head fixed_target_curriculum phase.
morphology_dim: 1024
num_cell_types: 6
expression_dim: 500
latent_dim: 32
graph_hidden_dim: 256
graph_output_dim: 256
graph_layers: 3
graph_mode: "off"
trunk_hidden_dims: [512, 256]
decoder_hidden_dims: [256, 256]
dropout: 0.10
prototype_temperature: 0.5
hard_type_routing: false
abstain_threshold: 0.60
nonnegative_expression: true
legacy_unrestricted_residual: false
residual_rank: 4
residual_max_norm: 0.5
scgpt_embedding_dim: 512
