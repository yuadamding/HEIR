schema_version: heir.snpatho_deepbench_plan.v1

benchmark:
  name: snpatho_deepbench_v1
  status: retrospective_diagnostic
  frozen_historical_result: snpatho_locked_v0_2

cohort:
  samples:
    - id: "4066"
      subtype: HER2_amplified
      site: primary_breast
    - id: "4399"
      subtype: TNBC
      site: liver_metastasis
    - id: "4411"
      subtype: luminal
      site: liver_metastasis

tracks:
  external_personalization_a1: unavailable
  capture_aware_a2: retrospective_only
  leave_one_specimen_out_b: unavailable

inputs:
  primary_rna: FFPE_snPATHO
  alternative_rna: [FFPE_scFFPE, frozen_Flex, frozen_3prime]
  target_visium_expression_before_freeze: prohibited
  target_rctd_before_freeze: prohibited
  target_histology: allowed
  target_snrna: allowed
  target_spot_geometry:
    primary_track: prohibited
    capture_aware_track: allowed

image:
  canonical_mpp: 0.5
  patch_diameters_um: [32, 128, 384]
  segmentation_primary: spaceranger_4_1_frozen_common_segmentation
  segmentation_sensitivity: [CellViT, StarDist]
  feature_encoders: [OmiCLIP, pathology_foundation_model]
  explicit_morphology: true

graph:
  knn: 12
  radius_um: 50
  maximum_degree: 24
  layers: 3
  hidden_dim: 256
  output_dim: 256

rna:
  model: scANVI
  latent_dim: 32
  likelihood: negative_binomial
  prototype_minimum_cells: 50
  maximum_prototypes_per_type: 10
  covariance: diagonal_shrinkage
  decoder_frozen: true
  primary_prior_update: fixed
  sensitivity_prior_max_tv: 0.05
  residual_basis: within_type_rna_pca_frozen
  residual_bound: type_specific_molecular_geometry
  rare_type_policy: strongly_shrunken_single_prototype
  retain_rare_types: true

targets:
  genes: 500
  programs:
    published_robust_nmf_clusters: 15
  cell_type_levels: [compartment, major_type, supported_subtype]

optimization:
  optimizer: AdamW
  learning_rate: 1.0e-4
  adapter_learning_rate: 1.0e-5
  weight_decay: 1.0e-4
  warmup_fraction: 0.05
  gradient_clip_norm: 1.0
  mixed_precision: true
  round0_epochs: 100
  refinement_epochs_per_round: 30
  maximum_sample_cells: 16384

refinement:
  maximum_rounds: 4
  broad_refinement_rounds: 2
  maximum_validation_loss_degradation: 0.01
  objective_relative_stability_tolerance: 0.01
  round_selection_mode: fixed
  maximum_spatial_score_degradation: 0.0
  e_step: detached_uot_responsibilities
  teacher_ema: 0.99
  minimum_probability: 0.90
  maximum_normalized_entropy: 0.20
  minimum_segmentation_confidence: 0.50
  minimum_view_agreement: 2
  anchors_revocable: true
  trusted_after_consecutive_rounds: 2
  revoke_probability_threshold: 0.70
  uot_unknown_mass: 0.05
  uot_unknown_mass_mode: fixed
  unknown_mass_sensitivity: [0.00, 0.01, 0.05, 0.10, 0.20]

randomness:
  primary_seeds: [17, 41, 89, 131, 197]
  ablation_seeds: [17, 41, 89]

evaluation:
  primary_baseline: joint_matched_ffpe_r1_hard_and_soft_type_means
  primary_baselines:
    - matched_ffpe_r1_hard_type_mean_hard_assigned_mass
    - matched_ffpe_r1_soft_type_mean_expected_soft_mass
  success_requires_all_primary_baselines: true
  primary_endpoint: paired_median_gene_spearman_delta
  primary_spot_minimum_nuclei: 3
  constant_prediction_correlation: zero
  aggregation_primary: matched_type_median_library_size
  aggregation_sensitivity: [equal_cell]
  secondary_metrics:
    - gene_pearson
    - gene_mse
    - gene_mae
    - gene_concordance
    - expression_detection_auroc
    - hotspot_dice
    - hotspot_jaccard
    - location_cosine
    - location_spearman
    - location_mae
    - morans_i_agreement

statistics:
  bootstrap_iterations: 10000
  final_cell_record_shuffle_permutations: 100
  spatial_block_um: 750
  per_gene_fdr: benjamini_hochberg
  specimen_macro_weighting: equal
  pooled_spot_inference: prohibited

controls:
  wrong_donor_rna: true
  generic_atlas: true
  label_permutation: true
  image_shuffle: true
  graph_shuffle: true
  no_refinement: true
  no_unknown: true
  no_graph: true
  prototype_only_no_residual: true
  state_omission: true
  reference_downsampling: [1000, 2500, 5000, all]

execution:
  frozen_benchmark_plan: ../../artifacts/snpatho/orchestration_v0_2/benchmark_plan.all.json
  frozen_benchmark_plan_sha256: 471dbf8f2b5632918772219d78722af36ccb4949b4d840e1c8ef227bf8f4c6b2
  frozen_historical_report: ../../artifacts/snpatho/orchestration_v0_2/benchmark.all.json
  frozen_historical_report_sha256: d002e601ffc0f1b69d141d507906f839815d305af9055780b38ff72bb4c12d65
  optional_artifacts:
    primary_ffpe_snpatho_reference_manifest:
      path: ../../reports/snpatho_r1_reference_manifest.json
      sha256: aea4040a6e0e758b491fa4609c0734e6093bfe0277ce00946f090e067134c9b1
    refined_predictions:
      path: ../../reports/snpatho_refinement_v1_seed17_manifest.json
      sha256: 4b981e42821a2055565e637c6f5a95c35eb1329bd209f33263feef1f0a04cb16
    five_seed_predictions:
      path: ../../reports/snpatho_refinement_v1_five_seed_manifest.json
      sha256: 69b6fc797a69e14e549288ed5297298d124283dcc11107572c084fd2000c4b99
    refinement_matrix_summary:
      path: ../../reports/snpatho_refinement_matrix_v1_summary.json
      sha256: aea29a49fbd00b1f8c3ed721345559ae4729b7c40cf2cf4db773de7ca7e14631
    alternative_workflow_references: null
    wrong_donor_predictions: null
    generic_atlas_predictions: null
    h_and_e_only_predictions: null
    image_shuffle_predictions: null
    graph_shuffle_predictions: null
    no_geometry_predictions: null
    manual_nucleus_labels: null
    spot_composition_covariates: null
    pathologist_regions: null
    published_program_definitions: null
    author_qc_tissue_fraction: null
    segmentation_sensitivity_predictions: null
    regional_384um_features: null
    native_scanvi_checkpoint:
      path: ../../reports/snpatho_scanvi_r1_manifest.json
