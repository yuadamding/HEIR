name: natcommun_heir_v0_1
manifest: ../../manifests/natcommun.tsv
output_dir: ../../outputs/natcommun_v0_1
mode: personalized
seed: 17
device: auto
spatial_validation_only: true
random_seeds: [17, 41, 89]

model:
  morphology_dim: 1024
  num_cell_types: 6
  expression_dim: 500
  latent_dim: 32
  graph_hidden_dim: 256
  graph_output_dim: 256
  graph_layers: 3
  trunk_hidden_dims: [512, 256]
  decoder_hidden_dims: [256, 256]
  dropout: 0.10
  hard_type_routing: false
  abstain_threshold: 0.60
  nonnegative_expression: true
  legacy_unrestricted_residual: false
  residual_rank: 4
  residual_max_norm: 0.5

rna:
  preferred_model: scANVI
  fallback_model: RNAVAE
  likelihood: negative_binomial
  latent_dim: 32
  prototype_minimum_cells: 50
  max_prototypes_per_type: 10
  shrinkage_kappa: 50

graph:
  construction: knn_plus_radius
  knn: 12
  radius_um: 50
  maximum_degree: 24

targets:
  primary_genes: 500
  programs: 32
  gene_panel: ../../manifests/gene_panel_example.tsv
  primary_space: nuclear

optimization:
  epochs: 100
  learning_rate: 1.0e-4
  adapter_learning_rate: 1.0e-5
  weight_decay: 1.0e-4
  warmup_fraction: 0.05
  gradient_clip_norm: 1.0
  bag_size: 2048
  reference_batch_size: 2048
  maximum_sample_cells: 16384
  early_stopping_patience: 15
  mixed_precision: true

losses:
  cell_type: 1.0
  marker: 0.2
  uot: 1.0
  program: 1.0
  pseudobulk: 0.5
  composition: 0.5
  cycle: 0.25
  residual: 0.1
  domain: 0.1
  latent_kl: 0.1
  graph: 0.05
  calibration: 0.05
  hierarchy: 0.1
  scgpt: 0.5

refinement:
  enabled: true
  maximum_rounds: 4
  min_probability: 0.90
  max_normalized_entropy: 0.20
  teacher_ema: 0.99
  # Primary analysis keeps the measured sample molecular prior fixed. Values
  # below 1.0 are reserved for prespecified prior-update sensitivities.
  prior_old_weight: 1.0
  minimum_segmentation_confidence: 0.50
  require_view_agreement: true
  maximum_prior_total_variation: 0.10
  max_anchors_per_class: 10000
  stable_rounds_required: 1
  maximum_validation_loss_degradation: 0.01
  objective_relative_stability_tolerance: 0.01
  round_selection_mode: fixed
  maximum_spatial_score_degradation: 0.0
  broad_refinement_rounds: 2

uncertainty:
  unknown_probability_threshold: 0.60
  ood_reference_quantile: 0.95
  latent_samples: 20
  ensemble_seeds: [17, 41, 89]
